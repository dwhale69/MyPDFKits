# MyPDFkits — Netlify configuration
# Static site, no build step. Drag-and-drop or connect this repo.

[build]
  publish = "."
  command = ""

# Pretty 404 fallback to the landing page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Sensible security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
